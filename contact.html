<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Jawad Digital Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white selection:bg-yellow-600 selection:text-black">

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter flex items-center gap-2">
                <span class="bg-yellow-600 text-black px-2 py-0.5 rounded">J</span> JAWADHUB
            </div>
            <div class="hidden md:flex space-x-8 text-[10px] font-black uppercase tracking-widest">
                <a href="index.html#home" class="hover:text-yellow-600 transition-colors">Home</a>
                <a href="index.html#about" class="hover:text-yellow-600 transition-colors">About</a>
                <a href="index.html#services" class="hover:text-yellow-600 transition-colors">Services</a>
                <a href="index.html#pricing" class="hover:text-yellow-600 transition-colors">Pricing</a>
            </div>
            <a href="https://wa.me/923117558876" class="bg-yellow-600 text-black px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all">Let's Talk</a>
        </div>
    </nav>

    <section class="pt-40 pb-24 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                
                <div>
                    <span class="text-yellow-600 font-black tracking-[0.5em] text-xs uppercase block mb-4">Get In Touch</span>
                    <h1 class="text-5xl md:text-7xl font-black uppercase mb-8 leading-none">Let's Build Your <span class="text-gray-500 text-outline">Legacy.</span></h1>
                    
                    <form action="#" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" placeholder="FULL NAME" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-yellow-600 outline-none transition-all text-xs font-bold tracking-widest">
                            <input type="email" placeholder="EMAIL ADDRESS" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-yellow-600 outline-none transition-all text-xs font-bold tracking-widest">
                        </div>
                        <select class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-yellow-600 outline-none transition-all text-xs font-bold tracking-widest text-gray-400">
                            <option>SELECT SERVICE</option>
                            <option>Starter Plan ($999)</option>
                            <option>Professional Plan ($1,999)</option>
                            <option>Enterprise / Custom</option>
                        </select>
                        <textarea rows="5" placeholder="TELL US ABOUT YOUR PROJECT" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-yellow-600 outline-none transition-all text-xs font-bold tracking-widest"></textarea>
                        <button class="w-full bg-yellow-600 text-black py-5 rounded-xl font-black uppercase text-xs tracking-[0.3em] hover:bg-white transition-all">Send Message</button>
                    </form>
                </div>

                <div class="bg-white/5 border border-white/10 rounded-3xl p-8 flex flex-col justify-center text-center">
                    <h3 class="text-2xl font-black uppercase mb-4">Schedule a Call</h3>
                    <p class="text-gray-400 text-sm mb-8 leading-relaxed">Prefer a face-to-face discussion? Book a 15-minute discovery call with Jawad directly.</p>
                    
                    <div class="border-2 border-dashed border-white/10 rounded-2xl p-12 bg-black/40 mb-8">
                        <i class="fa-solid fa-calendar-days text-4xl text-yellow-600 mb-4"></i>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Meeting Widget Here</p>
                    </div>

                    <div class="space-y-4">
                        <a href="https://www.linkedin.com/in/jawad-ahmad-62251b388/" target="_blank" class="flex items-center justify-center gap-3 text-xs font-bold hover:text-yellow-600 transition-colors uppercase tracking-widest border border-white/5 py-3 rounded-full">
                            <i class="fa-brands fa-linkedin text-lg"></i> Linkedin Profile
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-white/5 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-[10px] font-black uppercase tracking-[0.5em] text-gray-500">
                © 2026 Premier Digital Experience — Built by Jawad Ahmad
            </div>
        </div>
    </footer>

</body>
</html>
