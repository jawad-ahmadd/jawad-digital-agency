<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Budget Planner | Jawad Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #side-drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 md:px-12 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-yellow-600/10">
        <a href="index.html" class="flex items-center space-x-2 group">
            <div class="w-10 h-10 bg-gradient-to-tr from-yellow-700 to-yellow-400 flex items-center justify-center rounded-xl gold-glow">
                <span class="text-black font-black text-lg">J</span>
            </div>
            <div class="text-xl font-black tracking-tighter uppercase text-white">JAWAD<span class="text-yellow-500">HUB</span></div>
        </a>
        <div class="hidden md:flex flex-1 justify-center space-x-10 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
            <a href="index.html#home" class="hover:text-yellow-500 transition-colors">Home</a>
            <a href="blog.html" class="hover:text-yellow-500 transition-colors">Blog</a>
            <a href="contact.html" class="text-yellow-500 hover:text-white transition-colors">Contact Us</a>
        </div>
        <button id="open-menu" class="md:hidden text-yellow-500 p-1"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg></button>
    </nav>

    <div id="side-drawer" class="fixed inset-0 bg-black z-[110] transform translate-x-full md:hidden flex flex-col text-center">
        <div class="p-8 flex justify-between items-center border-b border-yellow-600/10 pb-6 mb-12">
            <span class="text-white font-black text-2xl tracking-tighter uppercase">JAWAD<span class="text-yellow-500">HUB</span></span>
            <button id="close-menu" class="text-yellow-500 p-1"><svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <nav class="flex flex-col space-y-10 text-white text-3xl font-bold uppercase flex-grow">
            <a href="index.html#home" class="mobile-nav-link hover:text-yellow-500">Home</a>
            <a href="blog.html" class="mobile-nav-link hover:text-yellow-500">Blog</a>
            <a href="contact.html" class="mobile-nav-link text-yellow-500 italic font-black">Contact</a>
        </nav>
    </div>

    <main class="pt-40 pb-20 px-6 max-w-5xl mx-auto min-h-screen fade-in">
        <header class="mb-16 text-center">
            <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter leading-none">
                Budget <span class="text-yellow-500">Planner</span>
            </h1>
            <p class="text-gray-500 mt-4 tracking-widest uppercase text-[10px]">Data-Driven Advertising Projections for USA/UK Markets</p>
        </header>

        <div class="bg-zinc-900/40 border border-white/5 rounded-[2.5rem] p-8 md:p-12 gold-glow backdrop-blur-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Target Monthly Revenue ($)</label>
                        <input type="number" id="targetRevenue" placeholder="e.g. 10000" class="w-full bg-transparent border-b border-white/10 py-3 text-2xl font-bold outline-none focus:border-yellow-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Average Product Price ($)</label>
                        <input type="number" id="avgPrice" placeholder="e.g. 50" class="w-full bg-transparent border-b border-white/10 py-3 text-2xl font-bold outline-none focus:border-yellow-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Target ROAS (Goal)</label>
                        <select id="targetRoas" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm font-bold text-yellow-500 outline-none">
                            <option value="2">2.0x (Aggressive Growth)</option>
                            <option value="3" selected>3.0x (Standard Healthy)</option>
                            <option value="4">4.0x (Highly Profitable)</option>
                            <option value="5">5.0x (Elite Efficiency)</option>
                        </select>
                    </div>
                    <button onclick="calculateBudget()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase italic tracking-widest hover:scale-[1.02] transition-transform">Calculate Budget</button>
                </div>

                <div class="bg-gradient-to-br from-zinc-800 to-black rounded-[2rem] p-10 border border-yellow-500/20 flex flex-col justify-between text-left shadow-2xl">
                    <div class="space-y-8">
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-yellow-500/60 block">Daily Ad Spend Required:</span>
                            <h2 id="dailySpend" class="text-5xl font-black text-white">$0</h2>
                        </div>
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-yellow-500/60 block">Monthly Ad Spend:</span>
                            <h2 id="monthlySpend" class="text-4xl font-black text-white">$0</h2>
                        </div>
                        <div class="pt-6 border-t border-white/10">
                            <span class="text-[9px] font-black uppercase tracking-widest text-gray-500 block">Orders Needed to Hit Goal:</span>
                            <h2 id="ordersNeeded" class="text-3xl font-black text-yellow-500 italic">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black border-t border-white/5 pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-6 md:px-12 text-center">
            <div class="text-2xl font-black tracking-tighter uppercase text-white mb-6">JAWAD<span class="text-yellow-500">HUB</span></div>
            <p class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold">© 2026 JAWAD DIGITAL HUB. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        // Menu Scripts
        const openBtn = document.getElementById('open-menu');
        const closeBtn = document.getElementById('close-menu');
        const sideDrawer = document.getElementById('side-drawer');
        openBtn.onclick = () => sideDrawer.classList.remove('translate-x-full');
        closeBtn.onclick = () => sideDrawer.classList.add('translate-x-full');

        function calculateBudget() {
            const revenue = parseFloat(document.getElementById('targetRevenue').value) || 0;
            const price = parseFloat(document.getElementById('avgPrice').value) || 1;
            const roas = parseFloat(document.getElementById('targetRoas').value) || 1;

            const monthlyBudget = revenue / roas;
            const dailyBudget = monthlyBudget / 30;
            const orders = revenue / price;

            document.getElementById('dailySpend').innerText = `$${Math.round(dailyBudget)}`;
            document.getElementById('monthlySpend').innerText = `$${Math.round(monthlyBudget)}`;
            document.getElementById('ordersNeeded').innerText = `${Math.round(orders)} Units`;
        }
    </script>
</body>
</html>
