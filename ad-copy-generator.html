<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ad Copy Generator | Jawad Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #side-drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 md:px-12 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-yellow-600/10">
        <a href="index.html" class="flex items-center space-x-2 group">
            <div class="w-10 h-10 bg-gradient-to-tr from-yellow-700 to-yellow-400 flex items-center justify-center rounded-xl gold-glow">
                <span class="text-black font-black text-lg">J</span>
            </div>
            <div class="text-xl font-black tracking-tighter uppercase text-white">JAWAD<span class="text-yellow-500">HUB</span></div>
        </a>
        <div class="hidden md:flex flex-1 justify-center space-x-10 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
            <a href="index.html" class="hover:text-yellow-500 transition-colors">Home</a>
            <a href="blog.html" class="hover:text-yellow-500 transition-colors">Blog</a>
            <a href="contact.html" class="text-yellow-500 hover:text-white transition-colors">Contact Us</a>
        </div>
        <button id="open-menu" class="md:hidden text-yellow-500 p-1"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg></button>
    </nav>

    <div id="side-drawer" class="fixed inset-0 bg-black z-[110] transform translate-x-full md:hidden flex flex-col">
        <div class="p-8 flex justify-between items-center border-b border-yellow-600/10 pb-6 mb-12">
            <span class="text-white font-black text-2xl tracking-tighter uppercase">JAWAD<span class="text-yellow-500">HUB</span></span>
            <button id="close-menu" class="text-yellow-500 focus:outline-none p-1">
                <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col items-center space-y-10 text-white text-3xl font-bold uppercase flex-grow px-8">
            <a href="index.html" class="hover:text-yellow-500">Home</a>
            <a href="blog.html" class="hover:text-yellow-500">Blog</a>
            <a href="contact.html" class="text-yellow-500 italic">Contact</a>
        </nav>
    </div>

    <main class="pt-40 pb-20 px-6 max-w-5xl mx-auto min-h-screen fade-in">
        <header class="mb-16 text-center">
            <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter leading-none">
                AI Ad <span class="text-yellow-500">Copy</span>
            </h1>
            <p class="text-gray-500 mt-4 tracking-widest uppercase text-[10px]">Generate High-Converting Western Ads in Seconds</p>
        </header>

        <div class="bg-zinc-900/40 border border-white/5 rounded-[2.5rem] p-8 md:p-12 gold-glow backdrop-blur-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Product Name / Niche</label>
                        <input type="text" id="productName" placeholder="e.g. Premium Suede Boots" class="w-full bg-transparent border-b border-white/10 py-3 text-xl font-bold outline-none focus:border-yellow-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Main Benefit</label>
                        <input type="text" id="benefit" placeholder="e.g. Waterproof & 50% Off" class="w-full bg-transparent border-b border-white/10 py-3 text-xl font-bold outline-none focus:border-yellow-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Select Ad Tone</label>
                        <select id="adTone" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm font-bold text-yellow-500 outline-none">
                            <option value="luxurious">Luxurious & Elite</option>
                            <option value="bold">Bold & Urgent</option>
                            <option value="minimalist">Clean & Minimalist</option>
                        </select>
                    </div>
                    <button onclick="generateCopy()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase italic tracking-widest hover:scale-[1.02] transition-transform">Generate Ad Copy</button>
                </div>

                <div class="bg-black/50 border border-white/5 rounded-[2rem] p-8 min-h-[300px] relative overflow-hidden">
                    <div id="outputContainer" class="hidden">
                        <span class="text-[9px] font-black uppercase tracking-widest text-yellow-500 block mb-6">Generated Results:</span>
                        <div id="copyResult" class="text-gray-300 text-lg leading-relaxed italic space-y-6">
                            </div>
                        <button onclick="copyToClipboard()" class="mt-8 text-white/40 text-[9px] uppercase font-black hover:text-yellow-500 transition-colors">Click to Copy Result</button>
                    </div>
                    <div id="placeholderText" class="flex items-center justify-center h-full text-zinc-700 text-center font-bold italic uppercase text-sm tracking-widest">
                        Your optimized copy will appear here...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black border-t border-white/5 py-12 text-center">
        <p class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold">© 2026 JAWAD DIGITAL HUB. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Menu Scripts
        const openBtn = document.getElementById('open-menu');
        const closeBtn = document.getElementById('close-menu');
        const sideDrawer = document.getElementById('side-drawer');
        openBtn.onclick = () => sideDrawer.classList.remove('translate-x-full');
        closeBtn.onclick = () => sideDrawer.classList.add('translate-x-full');

        function generateCopy() {
            const product = document.getElementById('productName').value || 'Product';
            const benefit = document.getElementById('benefit').value || 'Premium Quality';
            const tone = document.getElementById('adTone').value;
            
            document.getElementById('placeholderText').classList.add('hidden');
            document.getElementById('outputContainer').classList.remove('hidden');

            let templates = {
                luxurious: `<strong>Headline:</strong> Experience Excellence. <br><br>Elevate your lifestyle with ${product}. Craftsmanship meets modern sophistication. ${benefit}—because you deserve nothing less than elite. <br><br><strong>CTA:</strong> Discover the Collection.`,
                bold: `<strong>Headline:</strong> STOP SETTLING. <br><br>Get the results you've been waiting for. ${product} is here to change the game. ${benefit}. Limited availability—act now or miss out forever. <br><br><strong>CTA:</strong> GRAB YOURS NOW.`,
                minimalist: `<strong>Headline:</strong> Simply ${product}. <br><br>Quality redefined. <br>Design perfected. <br>${benefit}. <br><br><strong>CTA:</strong> Shop Essentials.`
            };

            document.getElementById('copyResult').innerHTML = templates[tone];
        }

        function copyToClipboard() {
            const text = document.getElementById('copyResult').innerText;
            navigator.clipboard.writeText(text);
            alert('Copy saved to clipboard!');
        }
    </script>
</body>
</html>
